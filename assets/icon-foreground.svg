<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Adaptive-icon foreground: all content inside the central ~66% safe zone
       (roughly x/y 176..848) because Android masks the outer edge. -->
  <defs>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd84d"/>
      <stop offset="1" stop-color="#fff3a6"/>
    </linearGradient>
    <radialGradient id="ballshade" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.75" stop-color="#e8edf7"/>
      <stop offset="1" stop-color="#b9c4da"/>
    </radialGradient>
  </defs>

  <!-- growth arrow -->
  <path d="M300 690 L432 570 L516 634 L668 470" fill="none" stroke="url(#arrow)"
    stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M584 452 L688 452 L688 556" fill="none" stroke="url(#arrow)"
    stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- soccer ball -->
  <circle cx="512" cy="500" r="160" fill="url(#ballshade)"/>
  <circle cx="512" cy="500" r="160" fill="none" stroke="#0a1130" stroke-width="11"/>
  <path d="M512 434 L575 480 L551 554 L473 554 L449 480 Z" fill="#0a1130"/>
  <path d="M512 340 L547 397 L512 424 L477 397 Z" fill="#0a1130"/>
  <path d="M656 448 L666 507 L612 500 L604 463 Z" fill="#0a1130"/>
  <path d="M368 448 L358 507 L412 500 L420 463 Z" fill="#0a1130"/>
  <path d="M576 645 L518 660 L518 617 L556 602 Z" fill="#0a1130"/>
  <path d="M448 645 L506 660 L506 617 L468 602 Z" fill="#0a1130"/>
  <g stroke="#0a1130" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M512 424 L512 434"/>
    <path d="M575 480 L612 487"/>
    <path d="M449 480 L412 487"/>
    <path d="M551 554 L566 607"/>
    <path d="M473 554 L458 607"/>
  </g>
  <ellipse cx="458" cy="430" rx="66" ry="38" fill="#ffffff" opacity="0.35" transform="rotate(-24 458 430)"/>
</svg>
